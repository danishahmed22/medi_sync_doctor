name: medisync_doctor
description: "MediSync — Clinic Management System for Doctors & Staff."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # ── Auth ────────────────────────────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^14.2.7

  # ── Local Storage ───────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── File Handling ───────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # ── Utilities ───────────────────────────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.19.0
  equatable: ^2.0.5
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # ── UI ──────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
